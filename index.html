<script>
  async function loadDID() {
    try {
      const res = await fetch("https://pepepica12.github.io/alma_did/did.json");
      const data = await res.json();
      const services = data.service;

      const menu = document.createElement("nav");
      menu.style.marginBottom = "2rem";

      const sections = {
        "Estudiantes": { id: "#backend-render", class: "estudiantes" },
        "Hogar": { id: "#railway-telemetria", class: "hogar" },
        "Negocios": { id: "#frontend-vercel", class: "negocios" },
        "Comunidad": { id: "#frontend-github", class: "comunidad" }
      };

      for (const [label, info] of Object.entries(sections)) {
        const btn = document.createElement("button");
        btn.textContent = label;
        btn.className = info.class;

        btn.onclick = async () => {
          const service = services.find(s => s.id === info.id);
          if (service) {
            try {
              const res = await fetch(service.serviceEndpoint);
              if (!res.ok) throw new Error("Servicio no disponible");
              const data = await res.json();
              document.getElementById("did").innerHTML =
                "<h2>" + label + "</h2><pre>" +
                JSON.stringify(data, null, 2) + "</pre>";
            } catch (e) {
              document.getElementById("did").innerHTML =
                "<h2>" + label + "</h2><p>El servicio está iniciando o no responde. Intenta de nuevo en unos segundos.</p>";
            }
          } else {
            document.getElementById("did").innerHTML =
              "<p>Servicio no encontrado en DID</p>";
          }
        };

        menu.appendChild(btn);
      }

      document.body.insertBefore(menu, document.getElementById("did"));
    } catch (e) {
      document.getElementById("did").innerHTML =
        "<p>Error cargando did.json</p>";
    }
  }

  // Ejecutar solo DID y Backend (sin config.json)
  loadDID();

  async function loadBackend() {
    try {
      const res = await fetch("https://cerebro-nexo-bankend.onrender.com/");
      if (!res.ok) throw new Error("Backend no disponible");
      const data = await res.json();
      document.getElementById("backend").innerHTML =
        "<h2>Backend:</h2><pre>" + JSON.stringify(data, null, 2) + "</pre>";
    } catch (e) {
      document.getElementById("backend").innerHTML =
        "<p>El backend está iniciando o no responde. Intenta de nuevo en unos segundos.</p>";
    }
  }

  loadBackend();
</script>
