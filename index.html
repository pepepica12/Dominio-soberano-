<script>
  async function loadDID() {
    try {
      const res = await fetch("https://pepepica12.github.io/alma_did/did.json");
      const data = await res.json();
      const services = data.service;

      const menu = document.createElement("nav");
      menu.style.marginBottom = "2rem";

      const sections = {
        "Estudiantes": "#backend-render",
        "Hogar": "#railway-telemetria",
        "Negocios": "#frontend-vercel",
        "Comunidad": "#frontend-github"
      };

      for (const [label, id] of Object.entries(sections)) {
        const btn = document.createElement("button");
        btn.textContent = label;
        btn.style.marginRight = "1rem";
        btn.style.padding = "0.5rem 1rem";
        btn.style.background = "#444";
        btn.style.color = "white";
        btn.style.border = "none";
        btn.style.borderRadius = "4px";
        btn.style.cursor = "pointer";

        btn.onclick = async () => {
          const service = services.find(s => s.id === id);
          if (service) {
            try {
              const res = await fetch(service.serviceEndpoint);
              const data = await res.json();
              document.getElementById("did").innerHTML =
                "<h2>" + label + "</h2><pre>" +
                JSON.stringify(data, null, 2) + "</pre>";
            } catch (e) {
              document.getElementById("did").innerHTML =
                "<h2>" + label + "</h2><p>Error conectando a " +
                service.serviceEndpoint + "</p>";
            }
          } else {
            document.getElementById("did").innerHTML =
              "<p>Servicio no encontrado en DID</p>";
          }
        };

        menu.appendChild(btn);
      }

      document.body.insertBefore(menu, document.getElementById("config"));
    } catch (e) {
      document.getElementById("did").innerHTML =
        "<p>Error cargando did.json</p>";
    }
  }

  loadDID();
</script>
